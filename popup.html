<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 320px; font-family: 'Segoe UI', Arial, sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 16px; color: #004d40; margin: 0; }
        select#lang { padding: 2px; font-size: 11px; cursor: pointer; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button#calculateBtn { width: 100%; padding: 12px; background-color: #00796b; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button#calculateBtn:hover { background-color: #004d40; }
        #result { margin-top: 15px; padding: 12px; background-color: #ffffff; border: 2px solid #e0f2f1; border-radius: 6px; font-weight: bold; text-align: center; color: #004d40; min-height: 44px; }
        .footer-link { display: block; margin-top: 15px; text-align: center; color: #00796b; text-decoration: none; font-size: 12px; font-weight: bold; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="header-top">
        <h2 id="title">Hosting Calculator</h2>
        <select id="lang">
            <option value="it">ITA</option>
            <option value="en">ENG</option>
        </select>
    </div>
    
    <div class="input-group">
        <label id="lblCurrency" for="currency">Valuta:</label>
        <select id="currency">
            <option value="€">Euro (€)</option>
            <option value="$">Dollaro ($)</option>
            <option value="£">Sterlina (£)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="lblDuration" for="duration">Periodo totale da calcolare:</label>
        <select id="duration">
            <option value="12">1 Anno (12 mesi)</option>
            <option value="24">2 Anni (24 mesi)</option>
            <option value="36" selected>3 Anni (36 mesi)</option>
            <option value="48">4 Anni (48 mesi)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="lblPromoPrice" for="promoPrice">Prezzo Promo (al mese):</label>
        <input type="number" id="promoPrice" step="0.01" placeholder="es. 2.99">
    </div>

    <div class="input-group">
        <label id="lblPromoMonths" for="promoMonths">Quanti mesi dura la promo?</label>
        <input type="number" id="promoMonths" placeholder="es. 12">
    </div>

    <div class="input-group">
        <label id="lblRenewalPrice" for="renewalPrice">Prezzo Rinnovo (al mese):</label>
        <input type="number" id="renewalPrice" step="0.01" placeholder="es. 12.99">
    </div>

    <button id="calculateBtn">Calcola Costo Reale</button>
    
    <div id="result">---</div>

    <a href="https://giuseppemattina.com/hosting/" target="_blank" class="footer-link" id="lnkReviews">Confronta Migliori Hosting</a>

    <script src="popup.js"></script>
</body>
</html>
